name: vscode-gnu-poke build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: lannonbr/vsce-action@4.0.0
        with:
          args: "package"
      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: gnu-poke-*.vsix
          overwrite: true
